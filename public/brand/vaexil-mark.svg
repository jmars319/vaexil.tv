    <path d="M48 54L78 116M112 54L82 116" stroke="#05070d" stroke-opacity="0.75" stroke-width="3"/>
    <path d="M42 78H58M56 98H72M102 76H120M88 100H104" stroke="#f8fbff" stroke-opacity="0.58" stroke-width="2"/>
    <path d="M22 82H12M148 82H138M80 22V12M80 148V138" stroke="#d946ef" stroke-opacity="0.62" stroke-width="2"/>
    <path d="M24 48C44 24 116 24 136 48M24 112C44 136 116 136 136 112" stroke="#d946ef" stroke-opacity="0.22" stroke-width="2"/>
  </g>
</svg>
