<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Vaexil mark</title>
  <desc id="desc">A neon cyan and magenta V mark with clean map and signal geometry.</desc>
  <defs>
    <linearGradient id="left" x1="30" y1="22" x2="84" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cf8ff"/>
      <stop offset="1" stop-color="#00b7ff"/>
    </linearGradient>
    <linearGradient id="right" x1="130" y1="22" x2="76" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff73dc"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.72 0 0 0 0 1 0 0 0 0.52 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g fill="none" stroke-linecap="square" stroke-linejoin="miter">
