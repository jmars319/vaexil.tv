name: Tooling Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '41 10 * * 1'

permissions:
  contents: read

jobs:
  just-security:
    name: just security
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install local tooling
        run: brew install just actionlint osv-scanner

      - name: Run local security gate
        run: just security
