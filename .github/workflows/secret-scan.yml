name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          version="8.30.1"
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" -o "/tmp/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan changed commits
        shell: bash
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          zero="0000000000000000000000000000000000000000"
          head="${GITHUB_SHA}"
          base=""

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              base="${PR_BASE_SHA}"
              ;;
            push)
              base="${PUSH_BEFORE}"
              ;;
          esac

          if [[ -n "${base}" && "${base}" != "${zero}" ]]; then
            git fetch --no-tags --depth=1 origin "${base}" || true
            log_opts="${base}..${head}"
          elif git rev-parse "${head}^" >/dev/null 2>&1; then
            log_opts="${head}^..${head}"
          else
            log_opts="${head} --max-count=1"
          fi

          if [[ "$(git rev-list --count ${log_opts} 2>/dev/null || echo 1)" = "0" ]]; then
            echo "No commits to scan."
            exit 0
          fi

          echo "Scanning commits: ${log_opts}"
          gitleaks git --log-opts="${log_opts}" --redact=100 --exit-code=1 --no-banner --no-color
