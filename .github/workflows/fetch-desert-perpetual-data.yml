name: Fetch Desert Perpetual manifest data

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/fetch-desert-perpetual-data.yml"

permissions:
  contents: read

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current Bungie manifest data
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          TERMS = [
              "desert perpetual", "iatros", "epoptes", "agraios", "koregos",
              "chronon", "diastole", "neomutation", "temporality", "worldline stability",
              "variable elimination", "banishment", "temporal oculus", "atemporal",
              "phase race", "cutthroat combat", "battalions", "token limit",
              "encounter challenges", "feature presentation", "network technician"
          ]
          ITEM_NAMES = {
              "Antedate", "Lance Ephemeral", "Intercalary", "Finite Maybe",
              "The When and Where", "Opaque Hourglass", "Whirling Ovation",
              "Cusp Sempiternal", "Starscape Null", "The Ever-Present",
              "Collective Psyche", "Wayward Psyche"
          }
          ACTIVITY_MODIFIER_HASHES = {
              249172590, 22295818, 3825969510, 1783825372,
              1009404927, 3792281695, 1806775150,
          }

          def read_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Vaexil-guide-research/1.0"})
              with urllib.request.urlopen(req, timeout=300) as response:
                  return json.load(response)

          manifest = read_json("https://www.bungie.net/Platform/Destiny2/Manifest/")["Response"]
          paths = manifest["jsonWorldComponentContentPaths"]["en"]

          def component(name):
              return read_json("https://www.bungie.net" + paths[name])

          records = component("DestinyRecordDefinition")
          objectives = component("DestinyObjectiveDefinition")
          presentation = component("DestinyPresentationNodeDefinition")
          activities = component("DestinyActivityDefinition")
          modifiers = component("DestinyActivityModifierDefinition")
          items = component("DestinyInventoryItemDefinition")
          collectibles = component("DestinyCollectibleDefinition")

          def dp(v):
              return v.get("displayProperties", {}) or {}

          def matches(value, extra=""):
              d = dp(value)
              text = f"{d.get('name','')} {d.get('description','')} {extra}".casefold()
              return any(term in text for term in TERMS)

          out = {
              "manifestVersion": manifest.get("version"),
              "activities": [],
              "modifiers": [],
              "featLikeModifiers": [],
              "records": [],
              "presentationNodes": [],
              "namedObjectives": [],
              "items": [],
              "collectibles": [],
          }

          challenge_objective_hashes = set()
          activity_modifier_hashes = set(ACTIVITY_MODIFIER_HASHES)
          for value in activities.values():
              if matches(value):
                  for challenge in value.get("challenges", []):
                      oh = challenge.get("objectiveHash")
                      if oh:
                          challenge_objective_hashes.add(oh)
                  for mod in value.get("modifiers", []):
                      mh = mod.get("activityModifierHash")
                      if mh:
                          activity_modifier_hashes.add(mh)
                  out["activities"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "activityModeTypes": value.get("activityModeTypes", []),
                      "activityLevel": value.get("activityLevel"),
                      "recommendedLight": value.get("recommendedLight"),
                      "modifiers": value.get("modifiers", []),
                      "challenges": value.get("challenges", []),
                      "rewards": value.get("rewards", []),
                  })

          seen_mods = set()
          for value in modifiers.values():
              h = value.get("hash")
              d = dp(value)
              name = d.get("name") or ""
              desc = d.get("description") or ""
              text = f"{name} {desc}".casefold()
              rendered = {"hash": h, "name": name, "description": desc}
              if matches(value) or h in activity_modifier_hashes:
                  if h not in seen_mods:
                      seen_mods.add(h)
                      out["modifiers"].append(rendered)
              if "feat" in text or any(t in text for t in ["phase race", "token limit", "cutthroat", "battalion", "encounter challenge"]):
                  out["featLikeModifiers"].append(rendered)

          for value in records.values():
              objective_defs = []
              for oh in value.get("objectiveHashes", []):
                  obj = objectives.get(str(oh), {})
                  objective_defs.append({
                      "hash": oh,
                      "progressDescription": obj.get("progressDescription"),
                      "completionValue": obj.get("completionValue"),
                      "locationHash": obj.get("locationHash"),
                      "displayProperties": obj.get("displayProperties"),
                  })
              if matches(value, json.dumps(objective_defs)) or 3954661385 in value.get("parentNodeHashes", []):
                  out["records"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "objectiveHashes": value.get("objectiveHashes", []),
                      "objectives": objective_defs,
                      "parentNodeHashes": value.get("parentNodeHashes", []),
                  })

          for value in presentation.values():
              if matches(value) or value.get("hash") == 3954661385:
                  out["presentationNodes"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "children": value.get("children", {}),
                      "parentNodeHashes": value.get("parentNodeHashes", []),
                  })

          for oh in sorted(challenge_objective_hashes):
              obj = objectives.get(str(oh), {})
              out["namedObjectives"].append({
                  "hash": oh,
                  "progressDescription": obj.get("progressDescription"),
                  "completionValue": obj.get("completionValue"),
                  "locationHash": obj.get("locationHash"),
                  "displayProperties": obj.get("displayProperties"),
              })

          collectible_names = set()
          for value in collectibles.values():
              name = dp(value).get("name") or ""
              if name in ITEM_NAMES or any(prefix in name for prefix in ["Collective Psyche", "Wayward Psyche"]):
                  collectible_names.add(name)
                  out["collectibles"].append({
                      "hash": value.get("hash"),
                      "name": name,
                      "description": dp(value).get("description"),
                      "sourceHash": value.get("sourceHash"),
                      "itemHash": value.get("itemHash"),
                  })

          for value in items.values():
              name = dp(value).get("name") or ""
              if name in ITEM_NAMES or name in collectible_names or any(prefix in name for prefix in ["Collective Psyche", "Wayward Psyche"]):
                  inv = value.get("inventory", {}) or {}
                  out["items"].append({
                      "hash": value.get("hash"),
                      "name": name,
                      "description": dp(value).get("description"),
                      "itemTypeDisplayName": value.get("itemTypeDisplayName"),
                      "itemType": value.get("itemType"),
                      "itemSubType": value.get("itemSubType"),
                      "classType": value.get("classType"),
                      "tierTypeName": inv.get("tierTypeName"),
                      "collectibleHash": value.get("collectibleHash"),
                      "sourceData": value.get("sourceData"),
                      "traitHashes": value.get("traitHashes", []),
                      "damageTypeHashes": value.get("damageTypeHashes", []),
                  })

          for key in ["activities", "modifiers", "featLikeModifiers", "records", "presentationNodes", "items", "collectibles"]:
              out[key].sort(key=lambda x: ((x.get("name") or ""), x.get("hash") or 0))

          pathlib.Path("tmp").mkdir(exist_ok=True)
          pathlib.Path("tmp/desert-perpetual-manifest-data.json").write_text(
              json.dumps(out, indent=2, ensure_ascii=False), encoding="utf-8"
          )
          print(json.dumps({k: len(v) if isinstance(v, list) else v for k,v in out.items()}, indent=2))
          PY

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: desert-perpetual-manifest-data
          path: tmp/desert-perpetual-manifest-data.json
          if-no-files-found: error
