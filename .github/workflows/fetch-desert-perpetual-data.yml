name: Fetch Desert Perpetual manifest data

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/fetch-desert-perpetual-data.yml"

permissions:
  contents: read

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current Bungie manifest data
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          import urllib.request

          TERMS = [
              "desert perpetual", "iatros", "epoptes", "agraios", "koregos",
              "chronon", "diastole", "neomutation", "temporality", "worldline stability",
              "variable elimination", "banishment", "temporal oculus", "atemporal"
          ]

          def read_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Vaexil-guide-research/1.0"})
              with urllib.request.urlopen(req, timeout=300) as response:
                  return json.load(response)

          manifest = read_json("https://www.bungie.net/Platform/Destiny2/Manifest/")["Response"]
          paths = manifest["jsonWorldComponentContentPaths"]["en"]

          def component(name):
              return read_json("https://www.bungie.net" + paths[name])

          records = component("DestinyRecordDefinition")
          objectives = component("DestinyObjectiveDefinition")
          presentation = component("DestinyPresentationNodeDefinition")
          activities = component("DestinyActivityDefinition")
          modifiers = component("DestinyActivityModifierDefinition")

          def dp(v):
              return v.get("displayProperties", {}) or {}

          def matches(value, extra=""):
              d = dp(value)
              text = f"{d.get('name','')} {d.get('description','')} {extra}".casefold()
              return any(term in text for term in TERMS)

          out = {
              "manifestVersion": manifest.get("version"),
              "activities": [],
              "modifiers": [],
              "records": [],
              "presentationNodes": [],
          }

          for value in activities.values():
              if matches(value):
                  out["activities"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "activityModeTypes": value.get("activityModeTypes", []),
                      "activityLevel": value.get("activityLevel"),
                      "recommendedLight": value.get("recommendedLight"),
                      "modifiers": value.get("modifiers", []),
                      "challenges": value.get("challenges", []),
                      "rewards": value.get("rewards", []),
                  })

          for value in modifiers.values():
              if matches(value):
                  out["modifiers"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                  })

          for value in records.values():
              objective_defs = []
              for oh in value.get("objectiveHashes", []):
                  obj = objectives.get(str(oh), {})
                  objective_defs.append({
                      "hash": oh,
                      "progressDescription": obj.get("progressDescription"),
                      "completionValue": obj.get("completionValue"),
                      "locationHash": obj.get("locationHash"),
                  })
              if matches(value, json.dumps(objective_defs)):
                  out["records"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "objectiveHashes": value.get("objectiveHashes", []),
                      "objectives": objective_defs,
                      "parentNodeHashes": value.get("parentNodeHashes", []),
                  })

          for value in presentation.values():
              if matches(value):
                  out["presentationNodes"].append({
                      "hash": value.get("hash"),
                      "name": dp(value).get("name"),
                      "description": dp(value).get("description"),
                      "children": value.get("children", {}),
                      "parentNodeHashes": value.get("parentNodeHashes", []),
                  })

          for key in ["activities", "modifiers", "records", "presentationNodes"]:
              out[key].sort(key=lambda x: ((x.get("name") or ""), x.get("hash") or 0))

          pathlib.Path("tmp").mkdir(exist_ok=True)
          pathlib.Path("tmp/desert-perpetual-manifest-data.json").write_text(
              json.dumps(out, indent=2, ensure_ascii=False), encoding="utf-8"
          )
          print(json.dumps({k: len(v) if isinstance(v, list) else v for k,v in out.items()}, indent=2))
          PY

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: desert-perpetual-manifest-data
          path: tmp/desert-perpetual-manifest-data.json
          if-no-files-found: error
